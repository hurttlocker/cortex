name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard workflow `if` expressions against direct secrets context
        run: |
          if grep -RInE "^[[:space:]]*if:[[:space:]]*\$\{\{[[:space:]]*secrets\." .github/workflows/*.yml; then
            echo "Direct secrets.* in if expressions is invalid; use env indirection (see #314)."
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Release/doc guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/ci_release_guard.sh --repo ${{ github.repository }}

      - name: Validate visualizer fixtures/contracts
        run: python3 scripts/validate_visualizer_contract.py

      - name: Build
        run: go build ./cmd/cortex/

      - name: Test
        run: go test ./... -v

      - name: Vet
        run: go vet ./...

      - name: Connectivity smoke (runtime path)
        run: scripts/connectivity_smoke.sh
